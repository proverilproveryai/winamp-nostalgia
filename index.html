<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winamp nostalgia</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  load
</div>

<div id="app" style="display:none">
  <div id="header">
    <h1>WINAMP NOSTALGIA</h1>
    <div class="sep"></div>
    <span id="fps-counter" style="font-family:var(--mono);font-size:11px;color:var(--dim)">-- fps</span>
    <span id="status">NO AUDIO</span>
  </div>

  <div id="sidebar">
    <div class="sidebar-section">Audio Source</div>
    <div id="audio-controls">
      <button class="btn" id="btn-mic">🎙 Microphone Input</button>
      <button class="btn" id="btn-demo">▶ Synthetic Demo Tone</button>
      <button class="btn" id="btn-file">📁 Load Audio File</button>
      <input type="file" id="file-input" accept="audio/*" style="display:none">
      <button class="btn" id="btn-milk">💧 Load .milk Preset</button>
      <input type="file" id="milk-input" accept=".milk" multiple style="display:none">
    </div>
    <div id="mod-panel">
      <div class="mod-row">
        <span class="mod-label">Master Gain</span>
        <input class="mod-slider" type="range" id="mod-gain" min="0" max="3" step="0.01" value="1">
        <span class="mod-val" id="mod-gain-val">1.00</span>
      </div>

      <div class="mod-row">
        <span class="mod-label">Bass</span>
        <input class="mod-slider" type="range" id="mod-bass" min="0" max="3" step="0.01" value="1">
        <span class="mod-val" id="mod-bass-val">+0dB</span>
      </div>

      <div class="mod-row">
        <span class="mod-label">Mid</span>
        <input class="mod-slider" type="range" id="mod-mid" min="0" max="3" step="0.01" value="1">
        <span class="mod-val" id="mod-mid-val">+0dB</span>
      </div>

      <div class="mod-row">
        <span class="mod-label">Treble</span>
        <input class="mod-slider" type="range" id="mod-treble" min="0" max="3" step="0.01" value="1">
        <span class="mod-val" id="mod-treble-val">+0dB</span>
      </div>

      <div class="mod-row">
        <span class="mod-label">Zoom</span>
        <input class="mod-slider" type="range" id="mod-zoom" min="0.5" max="1.5" step="0.001" value="1">
        <span class="mod-val" id="mod-zoom-val">1.000</span>
      </div>

      <div class="mod-row">
        <span class="mod-label">Warp</span>
        <input class="mod-slider" type="range" id="mod-warp" min="0" max="2" step="0.01" value="1">
        <span class="mod-val" id="mod-warp-val">1.00</span>
      </div>

      <div class="mod-row">
        <span class="mod-label">Decay</span>
        <input class="mod-slider" type="range" id="mod-decay" min="0.5" max="1" step="0.001" value="0.98">
        <span class="mod-val" id="mod-decay-val">0.980</span>
      </div>
    </div>
    <div id="preset-search-wrap">
      <input id="preset-search" type="text" placeholder="filter presets...">
    </div>
    <div id="preset-list"></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="main-canvas"></canvas>
    <div id="start-screen">
      <p>SELECT AUDIO SOURCE TO BEGIN</p>
      <button class="big-btn" id="start-mic-big">USE MICROPHONE</button>
      <button class="big-btn" id="start-demo-big" style="border-color:var(--accent2);color:var(--accent2)">DEMO TONE</button>
    </div>
    <div id="overlay">
      <div id="overlay-preset">—</div>
      <div id="overlay-res">—</div>
    </div>
    <div id="blend-wrap">
      <span>BLEND</span>
      <input type="range" id="blend-slider" min="0" max="4" step="0.1" value="2">
      <span id="blend-val">2.0s</span>
    </div>
    <div id="meters"></div>
  </div>

  <div id="footer">
    <span id="preset-name-footer">no preset loaded</span>
    <span>навайбшкодил:</span>
    <a href="https://t.me/proveril_proveryai" class="contact-value" target="_blank">@proveril_proveryai</a>
  </div>
</div>


<script src="js/webmilk.min.js"></script>
<script src="js/webmilkPresets.min.js"></script>
<script src="js/logic.js"></script>
</body>
</html>
